<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Performance Dashboard</title>


    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/performance.png">


    <!-- CSS -->
    <link rel="stylesheet" href="style.css">


    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>


<body>


<div class="dashboard">


    <!-- ==========================================
                TITLE CARD
    ========================================== -->

    <header class="title-card">

        <h1>
            July Performance Stats
        </h1>

    </header>




    <!-- ==========================================
                MAIN CONTENT
    ========================================== -->

    <main class="content">



        <!-- ==========================================
                    RASIKA CARD
        ========================================== -->


        <section class="employee-card">


            <div class="profile-section">

                <img
                    src="images/rasika.png"
                    alt="Rasika"
                    class="profile-image"
                >

            </div>



            <div class="employee-name">

                Rasika

            </div>




            <div class="stat-card">


                <div class="stat-title">

                    Total Revenue

                </div>


                <div 
                    class="stat-value"
                    id="rasika-revenue"
                >

                    0

                </div>


            </div>





            <div class="stat-card">


                <div class="stat-title">

                    Number of Deals

                </div>


                <div 
                    class="stat-value"
                    id="rasika-deals"
                >

                    0

                </div>


            </div>



        </section>






        <!-- ==========================================
                    BAR CHART
        ========================================== -->


        <section class="chart-card">


            <canvas id="revenueChart"></canvas>


        </section>







        <!-- ==========================================
                    RAMZI CARD
        ========================================== -->


        <section class="employee-card">


            <div class="profile-section">


                <img
                    src="images/ramzi.png"
                    alt="Ramzi"
                    class="profile-image"
                >


            </div>




            <div class="employee-name">

                Ramzi

            </div>





            <div class="stat-card">


                <div class="stat-title">

                    Total Revenue

                </div>


                <div 
                    class="stat-value"
                    id="ramzi-revenue"
                >

                    0

                </div>


            </div>






            <div class="stat-card">


                <div class="stat-title">

                    Number of Deals

                </div>


                <div 
                    class="stat-value"
                    id="ramzi-deals"
                >

                    0

                </div>


            </div>



        </section>



    </main>



</div>




<!-- JavaScript -->

<script src="script.js"></script>


</body>


</html>
