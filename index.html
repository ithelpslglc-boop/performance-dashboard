<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        July Performance Stats
    </title>


    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/performance.png">


    <!-- CSS -->
    <link rel="stylesheet" href="style.css">


    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>



<body>



<div class="dashboard">



    <!-- ================================
            TITLE
    ================================= -->


    <header class="title-card">


        <div class="title-content">


            <h1>
                JULY PERFORMANCE STATS
            </h1>


        </div>


    </header>







    <!-- ================================
            CONTENT
    ================================= -->


    <main class="content">







        <!-- ================================
                RASIKA CARD
        ================================= -->


        <section class="employee-card rasika-card">


            <div class="profile-section">


                <img

                    src="images/rasika.png"

                    alt="Rasika"

                    class="profile-image"

                >


            </div>





            <div class="employee-name">

                Rasika

            </div>








            <!-- REVENUE -->

            <div class="stat-card">


                <div class="stat-title">

                    TOTAL REVENUE

                </div>


                <div

                    class="stat-value"

                    id="rasika-revenue"

                >

                    0


                </div>


            </div>








            <!-- DEALS -->

            <div class="stat-card">


                <div class="stat-title">

                    NUMBER OF DEALS

                </div>


                <div

                    class="stat-value"

                    id="rasika-deals"

                >

                    0


                </div>


            </div>






        </section>










        <!-- ================================
                CHART
        ================================= -->


        <section class="chart-card">



            <div class="chart-header">


                <h2>

                    Revenue Comparison

                </h2>



                <p>

                    Rasika vs Ramzi

                </p>


            </div>





            <div class="chart-container">


                <canvas id="revenueChart"></canvas>


            </div>




        </section>









        <!-- ================================
                RAMZI CARD
        ================================= -->


        <section class="employee-card ramzi-card">



            <div class="profile-section">


                <img

                    src="images/ramzi.png"

                    alt="Ramzi"

                    class="profile-image"

                >


            </div>





            <div class="employee-name">

                Ramzi

            </div>








            <!-- REVENUE -->

            <div class="stat-card">


                <div class="stat-title">

                    TOTAL REVENUE

                </div>


                <div

                    class="stat-value"

                    id="ramzi-revenue"

                >

                    0


                </div>


            </div>








            <!-- DEALS -->

            <div class="stat-card">


                <div class="stat-title">

                    NUMBER OF DEALS

                </div>


                <div

                    class="stat-value"

                    id="ramzi-deals"

                >

                    0


                </div>


            </div>







        </section>






    </main>





</div>






<script src="script.js"></script>



</body>


</html>
